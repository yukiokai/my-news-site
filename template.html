<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="国内外の最新ニュースを自動収集した1ページ完結のニュースサイトです。国内外、IT、経済のニュースをまとめてチェックできます。">
    <title>Daily Digest - 1Page News</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-grad-start: #0f172a;
            --bg-grad-end: #1e1b4b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, var(--bg-grad-start), var(--bg-grad-end));
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 4rem 0 3rem;
            border-bottom: 1px solid var(--card-border);
            position: relative;
            animation: fadeInDown 0.8s ease-out forwards;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to right, #38bdf8, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1.5px;
            text-shadow: 0 10px 30px rgba(56, 189, 248, 0.2);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.2rem;
            margin-top: 0.8rem;
            font-weight: 500;
        }

        .timestamp-badge {
            font-size: 0.9rem;
            color: var(--accent);
            margin-top: 1.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.2rem;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 999px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        
        .timestamp-badge:hover {
            box-shadow: 0 4px 20px rgba(56, 189, 248, 0.3);
            background: rgba(56, 189, 248, 0.15);
        }

        .category-section {
            margin-bottom: 5rem;
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        /* Staggered animation delays for categories */
        .category-section:nth-child(2) { animation-delay: 0.2s; }
        .category-section:nth-child(3) { animation-delay: 0.3s; }
        .category-section:nth-child(4) { animation-delay: 0.4s; }
        .category-section:nth-child(5) { animation-delay: 0.5s; }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .category-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            color: #f1f5f9;
        }

        .category-title::before {
            content: '';
            display: block;
            width: 6px;
            height: 32px;
            background: linear-gradient(to bottom, #38bdf8, #818cf8);
            border-radius: 3px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 1.8rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
            border-color: rgba(56, 189, 248, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-title {
            font-size: 1.15rem;
            font-weight: 600;
            margin: 0 0 1.5rem 0;
            line-height: 1.5;
            position: relative;
            z-index: 1;
        }

        .card-footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            position: relative;
            z-index: 1;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .source-tag {
            font-weight: 600;
            color: #e2e8f0;
            background: rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 6px;
        }

        .date {
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
        }

        footer {
            text-align: center;
            padding: 3rem 0;
            margin-top: 4rem;
            border-top: 1px solid var(--card-border);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .container { padding: 1.5rem; }
            h1 { font-size: 2.5rem; }
            .category-title { font-size: 1.6rem; }
            .grid { grid-template-columns: 1fr; }
            .card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>News Digest</h1>
            <div class="subtitle">国内外の最新ニュースを自動収集</div>
            <div class="timestamp-badge">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                最終更新: {{ update_time }}
            </div>
        </header>

        {% for category, items in news_data.items() %}
        {% if items %}
        <section class="category-section">
            <h2 class="category-title">{{ category }}</h2>
            <div class="grid">
                {% for item in items %}
                <a href="{{ item.link }}" target="_blank" rel="noopener noreferrer" class="card">
                    <h3 class="card-title">{{ item.title }}</h3>
                    <div class="card-footer">
                        <span class="source-tag">{{ item.source }}</span>
                        <span class="date">{{ item.date }}</span>
                    </div>
                </a>
                {% endfor %}
            </div>
        </section>
        {% endif %}
        {% endfor %}

        <footer>
            <p>&copy; 2024 News Digest. Generated by GitHub Actions.</p>
        </footer>
    </div>
</body>
</html>
